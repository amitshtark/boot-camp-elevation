<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 3</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <div class="form-card">
      <div class="form-header"> 
        <h1>Contact Form</h1>
        <p>Get in touch with us</p>
      </div>
      <div class="form-row">
        <div class="field"> 
          <label>First Name</label>
          <input>
        </div>
        <div class="field"> 
          <label>Last Name</label>
          <input>
        </div>
      </div>
      <div class="form-row">
        <div class="field"> 
          <label>Email Adress</label>
          <input>
        </div>
      </div>
      <div class="form-row">
        <div class="field"> 
          <label>Subject</label>
          <select><option>select a topic</option></select>
        </div>
        <div class="field"> 
          <label>Priority</label>
          <select><option>low</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="field"> 
          <label>Message</label>
          <textarea placeholder="Tell us how we can help..."></textarea>
        </div>
      </div>
      <div class="form-row col">
        <div><strong>Contact Preferences</strong></div>
        <div class="checkbox-row">
          <label> <input type="checkbox"> Email Updates</label>
          <label> <input type="checkbox"> Phone Follow-up</label>
          <label> <input type="checkbox"> Newsletter</label>
        </div>
      </div>
      <div class="buttons-row ">
        <button class="save-draft box">save draft</button>
        <button class="send-message box">send message</button>
      </div>
    </div>
  </div>

</body>
</html>
